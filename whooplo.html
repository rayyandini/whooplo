<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجري</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400..700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>

  /* ====================================================================
     إعدادات التصميم — قابلة للتخصيص من هنا
     ==================================================================== */
  :root{
    --bg:        #FAF6EC;   /* خلفية المتجر */
    --ink:       #23201B;   /* لون النص الأساسي */
    --ink-soft:  #6B6153;   /* نص ثانوي/باهت */
    --line:      #E3DAC4;   /* لون الفواصل */
    --accent:    #146356;   /* اللون الرئيسي (أخضر زمردي) */
    --accent-2:  #B98B2A;   /* لون ثانوي (ذهبي) */
    --card:      #FFFFFF;   /* خلفية البطاقات */
    --danger:    #B23A2E;
    --radius:    14px;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; }
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Tajawal', sans-serif;
    min-height:100vh;
    padding-bottom:100px;
  }
  h1,h2,h3,.brand,.price,.chip,.section-title{ font-family:'Reem Kufi', sans-serif; }

  a{ color:inherit; text-decoration:none; }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; }
  img{ display:block; max-width:100%; }

  /* ---------------- Header ---------------- */
  header{
    position:sticky; top:0; z-index:30;
    background:var(--bg);
    border-bottom:1px solid var(--line);
    padding:18px 20px 14px;
  }
  .header-row{
    display:flex; align-items:center; justify-content:space-between;
    max-width:1000px; margin:0 auto;
  }
  .brand{
    font-size:26px; font-weight:700; color:var(--ink);
    display:flex; align-items:center; gap:8px;
  }
  .brand span{ color:var(--accent); }
  .tagline{
    font-size:13px; color:var(--ink-soft); margin-top:4px;
  }
  .cart-btn{
    position:relative;
    width:46px; height:46px;
    border-radius:50%;
    background:var(--ink);
    color:#fff;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .cart-btn svg{ width:20px; height:20px; }
  .cart-count{
    position:absolute; top:-4px; left:-4px;
    background:var(--accent-2);
    color:#fff;
    font-size:11px; font-weight:700;
    min-width:19px; height:19px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    padding:0 4px;
  }

  /* ---------------- Category chips ---------------- */
  .chips{
    max-width:1000px; margin:14px auto 0;
    display:flex; gap:8px;
    overflow-x:auto;
    padding-bottom:2px;
  }
  .chips::-webkit-scrollbar{ display:none; }
  .chip{
    flex-shrink:0;
    padding:8px 18px;
    border-radius:100px;
    border:1.5px solid var(--line);
    background:var(--card);
    font-size:14px; font-weight:500;
    color:var(--ink-soft);
    white-space:nowrap;
    transition:all .15s ease;
  }
  .chip.active{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }

  /* ---------------- Product grid ---------------- */
  main{ max-width:1000px; margin:0 auto; padding:22px 20px; }
  .grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:18px;
  }
  @media(max-width:820px){ .grid{ grid-template-columns:repeat(2, 1fr); gap:14px; } }
  @media(max-width:460px){ .grid{ grid-template-columns:1fr; } }

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    display:flex; flex-direction:column;
  }
  .card-img{
    aspect-ratio:1/1;
    background:var(--line);
    overflow:hidden;
    position:relative;
  }
  .card-img img{ width:100%; height:100%; object-fit:cover; }
  .card-body{ padding:14px 14px 16px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .card-cat{
    font-size:11px; font-weight:700; color:var(--accent);
    letter-spacing:.5px;
  }
  .card-name{ font-size:16px; font-weight:500; line-height:1.4; }
  .card-desc{ font-size:12.5px; color:var(--ink-soft); line-height:1.5; flex:1; }
  .card-footer{
    display:flex; align-items:center; justify-content:space-between;
    margin-top:6px;
  }
  .price{ font-size:18px; font-weight:700; color:var(--ink); }
  .price small{ font-size:12px; font-weight:400; color:var(--ink-soft); }
  .add-btn{
    background:var(--ink);
    color:#fff;
    padding:8px 16px;
    border-radius:100px;
    font-size:13px; font-weight:700;
    transition:transform .12s ease, background .15s ease;
  }
  .add-btn:hover{ background:var(--accent); }
  .add-btn:active{ transform:scale(.94); }

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--ink-soft);
  }

  /* ---------------- Floating cart bar ---------------- */
  .floating-bar{
    position:fixed; bottom:18px; right:20px; left:20px;
    max-width:460px; margin:0 auto;
    background:var(--ink);
    color:#fff;
    border-radius:100px;
    padding:12px 10px 12px 22px;
    display:flex; align-items:center; justify-content:space-between;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
    z-index:25;
    transform:translateY(140%);
    transition:transform .28s ease;
  }
  .floating-bar.show{ transform:translateY(0); }
  .floating-bar .fb-info{ font-size:14px; font-weight:500; }
  .floating-bar .fb-total{ font-family:'Reem Kufi'; font-weight:700; color:var(--accent-2); }
  .floating-bar .fb-open{
    background:var(--accent);
    color:#fff;
    padding:10px 20px;
    border-radius:100px;
    font-size:14px; font-weight:700;
  }

  /* ---------------- Cart drawer (receipt style) ---------------- */
  .overlay{
    position:fixed; inset:0; background:rgba(20,16,10,.45);
    opacity:0; pointer-events:none; transition:opacity .25s ease;
    z-index:40;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }

  .drawer{
    position:fixed; bottom:0; right:0; left:0;
    max-width:520px; margin:0 auto;
    background:var(--card);
    border-radius:22px 22px 0 0;
    max-height:86vh;
    display:flex; flex-direction:column;
    transform:translateY(100%);
    transition:transform .3s cubic-bezier(.32,.72,.35,1);
    z-index:41;
  }
  .drawer.show{ transform:translateY(0); }

  /* perforated "receipt tear" strip */
  .tear{
    height:14px;
    background:
      radial-gradient(circle 7px at 14px 0, transparent 7px, var(--accent) 7.5px) repeat-x;
    background-size:28px 14px;
    background-color:var(--accent);
    border-radius:22px 22px 0 0;
  }

  .drawer-head{
    padding:16px 20px 10px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px dashed var(--line);
  }
  .drawer-head h2{ font-size:19px; }
  .close-btn{ font-size:22px; color:var(--ink-soft); padding:4px 8px; }

  .drawer-body{ overflow-y:auto; padding:6px 20px; flex:1; }

  .cart-row{
    display:flex; align-items:center; gap:12px;
    padding:14px 0;
    border-bottom:1px dashed var(--line);
  }
  .cart-row img{ width:52px; height:52px; border-radius:8px; object-fit:cover; flex-shrink:0; }
  .cart-row-info{ flex:1; min-width:0; }
  .cart-row-name{ font-size:14.5px; font-weight:500; }
  .cart-row-price{ font-size:12.5px; color:var(--ink-soft); margin-top:2px; }
  .qty-box{
    display:flex; align-items:center; gap:8px;
    border:1px solid var(--line); border-radius:100px;
    padding:4px 8px;
  }
  .qty-box button{ font-size:16px; font-weight:700; width:18px; color:var(--accent); }
  .qty-box span{ font-size:14px; min-width:16px; text-align:center; }
  .remove-btn{ color:var(--danger); font-size:12px; margin-inline-start:6px; }

  .drawer-foot{
    border-top:1px dashed var(--line);
    padding:14px 20px 22px;
  }
  .total-row{
    display:flex; align-items:center; justify-content:space-between;
    font-size:15px; margin-bottom:14px;
  }
  .total-row b{ font-family:'Reem Kufi'; font-size:22px; color:var(--accent); }
  .wa-btn{
    width:100%;
    background:var(--accent);
    color:#fff;
    padding:15px;
    border-radius:100px;
    font-size:15.5px; font-weight:700;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .wa-btn:active{ transform:scale(.98); }
  .wa-btn svg{ width:19px; height:19px; }

  footer{
    text-align:center; padding:26px 20px 10px;
    color:var(--ink-soft); font-size:12px;
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <div class="brand"><span>●</span> متجري</div>
      <div class="tagline">تسوّق واطلب بضغطة — التوصيل عبر واتساب</div>
    </div>
    <button class="cart-btn" onclick="openDrawer()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="cart-count" id="cartCount" style="display:none">0</span>
    </button>
  </div>
  <div class="chips" id="chips"></div>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>

<footer>صُنع بحب لأجل متجرك 🌿</footer>

<!-- شريط عائم يظهر عند وجود منتجات بالسلة -->
<div class="floating-bar" id="floatingBar">
  <div class="fb-info">🛒 <span id="fbCount">0</span> منتج · <span class="fb-total" id="fbTotal">0 د.أ</span></div>
  <button class="fb-open" onclick="openDrawer()">عرض السلة</button>
</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<div class="drawer" id="drawer">
  <div class="tear"></div>
  <div class="drawer-head">
    <h2>سلة الطلبات</h2>
    <button class="close-btn" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="cartItems"></div>
  <div class="drawer-foot">
    <div class="total-row"><span>الإجمالي</span><b id="cartTotal">0 د.أ</b></div>
    <button class="wa-btn" onclick="sendOrder()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.6 6.32A7.85 7.85 0 0 0 12.05 4a7.94 7.94 0 0 0-6.87 11.92L4 20l4.2-1.1a7.9 7.9 0 0 0 3.85 1h.01a7.94 7.94 0 0 0 5.54-13.58zm-5.55 12.2h-.01a6.6 6.6 0 0 1-3.36-.92l-.24-.14-2.5.65.67-2.44-.16-.25a6.6 6.6 0 1 1 5.6 3.1zm3.6-4.94c-.2-.1-1.17-.58-1.35-.64s-.31-.1-.44.1-.5.64-.62.77-.23.15-.43.05a5.4 5.4 0 0 1-1.6-.98 6 6 0 0 1-1.1-1.37c-.12-.2 0-.31.09-.41.09-.09.2-.23.3-.35.1-.11.13-.2.2-.33.06-.13.03-.24-.02-.34s-.44-1.06-.6-1.45c-.16-.38-.32-.33-.44-.33h-.38c-.13 0-.34.05-.52.24s-.68.67-.68 1.63.7 1.9.8 2.03c.1.13 1.38 2.1 3.34 2.95.47.2.83.32 1.12.41.47.15.9.13 1.24.08.38-.06 1.17-.48 1.33-.94.16-.46.16-.85.12-.94-.05-.09-.18-.14-.38-.24z"/></svg>
      إرسال الطلب عبر واتساب
    </button>
  </div>
</div>

<script>
/* ====================================================================
   1) إعدادات المتجر — عدّل هذا الجزء بمعلوماتك
   ==================================================================== */
const STORE_NAME     = "متجري";                 // اسم متجرك
const WHATSAPP_NUMBER = "962790130603";          // رقمك بالصيغة الدولية بدون + أو 00

/* ====================================================================
   2) قائمة المنتجات — أضف/عدّل/احذف منتجات من هنا
   كل منتج: id (رقم فريد) - name - price (رقم) - category - image (رابط) - desc
   ==================================================================== */
const PRODUCTS = [
  { id:1, name:"عطر ورد دمشقي", price:22, category:"عطور", desc:"عطر فاخر بلمسة شرقية دافئة، يدوم طوال اليوم.", image:"https://picsum.photos/seed/perfume1/500/500" },
  { id:2, name:"عطر عود ملكي", price:28, category:"عطور", desc:"تركيبة عود أصيلة مع مسحة عنبر فاخرة.", image:"https://picsum.photos/seed/perfume2/500/500" },
  { id:3, name:"قميص قطن أبيض", price:15, category:"ملابس", desc:"قطن ناعم 100%، مقاسات متعددة.", image:"https://picsum.photos/seed/shirt1/500/500" },
  { id:4, name:"جاكيت شتوي", price:38, category:"ملابس", desc:"دافئ وأنيق، مناسب للأجواء الباردة.", image:"https://picsum.photos/seed/jacket1/500/500" },
  { id:5, name:"ساعة يد كلاسيك", price:26, category:"إكسسوارات", desc:"تصميم أنيق يناسب كل الإطلالات.", image:"https://picsum.photos/seed/watch1/500/500" },
  { id:6, name:"محفظة جلد طبيعي", price:19, category:"إكسسوارات", desc:"جلد طبيعي فاخر بتصميم عملي.", image:"https://picsum.photos/seed/wallet1/500/500" },
];

/* ==================================================================== 
   من هنا وتحت: منطق الموقع (ما تحتاج تعدل شي إلا إذا تبي تطور أكثر)
   ==================================================================== */

let cart = {};        // { productId: quantity }
let activeCategory = "الكل";

document.querySelector(".brand").innerHTML = `<span>●</span> ${STORE_NAME}`;
document.title = STORE_NAME;

function currency(n){ return n.toLocaleString('en-US') + " د.أ"; }

function renderChips(){
  const categories = ["الكل", ...new Set(PRODUCTS.map(p => p.category))];
  const chipsEl = document.getElementById("chips");
  chipsEl.innerHTML = categories.map(cat =>
    `<button class="chip ${cat===activeCategory?'active':''}" onclick="setCategory('${cat}')">${cat}</button>`
  ).join("");
}

function setCategory(cat){
  activeCategory = cat;
  renderChips();
  renderGrid();
}

function renderGrid(){
  const grid = document.getElementById("grid");
  const items = activeCategory === "الكل" ? PRODUCTS : PRODUCTS.filter(p => p.category === activeCategory);

  if(items.length === 0){
    grid.innerHTML = `<div class="empty-state">لا توجد منتجات في هذا التصنيف حالياً</div>`;
    return;
  }

  grid.innerHTML = items.map(p => `
    <div class="card">
      <div class="card-img"><img src="${p.image}" alt="${p.name}" loading="lazy"></div>
      <div class="card-body">
        <div class="card-cat">${p.category}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.desc || ""}</div>
        <div class="card-footer">
          <div class="price">${currency(p.price)}</div>
          <button class="add-btn" onclick="addToCart(${p.id})">أضف للسلة</button>
        </div>
      </div>
    </div>
  `).join("");
}

function addToCart(id){
  cart[id] = (cart[id] || 0) + 1;
  updateCartUI();
}

function changeQty(id, delta){
  if(!cart[id]) return;
  cart[id] += delta;
  if(cart[id] <= 0) delete cart[id];
  updateCartUI();
}

function removeFromCart(id){
  delete cart[id];
  updateCartUI();
}

function getCartDetails(){
  const entries = Object.entries(cart).map(([id, qty]) => {
    const product = PRODUCTS.find(p => p.id === Number(id));
    return { product, qty, subtotal: product.price * qty };
  });
  const total = entries.reduce((sum, e) => sum + e.subtotal, 0);
  const count = entries.reduce((sum, e) => sum + e.qty, 0);
  return { entries, total, count };
}

function updateCartUI(){
  const { entries, total, count } = getCartDetails();

  // floating bar
  const bar = document.getElementById("floatingBar");
  if(count > 0){
    bar.classList.add("show");
    document.getElementById("fbCount").textContent = count;
    document.getElementById("fbTotal").textContent = currency(total);
  } else {
    bar.classList.remove("show");
  }

  // header cart icon
  const cartCountEl = document.getElementById("cartCount");
  if(count > 0){
    cartCountEl.style.display = "flex";
    cartCountEl.textContent = count;
  } else {
    cartCountEl.style.display = "none";
  }

  // drawer content
  const itemsEl = document.getElementById("cartItems");
  if(entries.length === 0){
    itemsEl.innerHTML = `<div class="empty-state">سلتك فارغة حالياً<br>تصفح المنتجات وأضف اللي يعجبك 🛍️</div>`;
  } else {
    itemsEl.innerHTML = entries.map(e => `
      <div class="cart-row">
        <img src="${e.product.image}" alt="${e.product.name}">
        <div class="cart-row-info">
          <div class="cart-row-name">${e.product.name}</div>
          <div class="cart-row-price">${currency(e.product.price)} × ${e.qty} = ${currency(e.subtotal)}</div>
        </div>
        <div class="qty-box">
          <button onclick="changeQty(${e.product.id}, -1)">−</button>
          <span>${e.qty}</span>
          <button onclick="changeQty(${e.product.id}, 1)">+</button>
        </div>
        <button class="remove-btn" onclick="removeFromCart(${e.product.id})">حذف</button>
      </div>
    `).join("");
  }

  document.getElementById("cartTotal").textContent = currency(total);
}

function openDrawer(){
  document.getElementById("drawer").classList.add("show");
  document.getElementById("overlay").classList.add("show");
}
function closeDrawer(){
  document.getElementById("drawer").classList.remove("show");
  document.getElementById("overlay").classList.remove("show");
}

function sendOrder(){
  const { entries, total } = getCartDetails();
  if(entries.length === 0){
    alert("سلتك فارغة، أضف منتجات أولاً 🙂");
    return;
  }

  let message = `مرحباً، أحب أطلب من ${STORE_NAME}:\n\n`;
  entries.forEach(e => {
    message += `• ${e.product.name} × ${e.qty} = ${currency(e.subtotal)}\n`;
  });
  message += `\nالإجمالي: ${currency(total)}`;
  message += `\n\nالاسم: \nالمدينة/العنوان: \nملاحظات: `;

  const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
  window.open(url, "_blank");
}

// تشغيل أولي
renderChips();
renderGrid();
updateCartUI();
</script>

</body>
</html>
